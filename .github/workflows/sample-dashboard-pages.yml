name: Sample Dashboard Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/sample-dashboard/**"
      - ".github/workflows/sample-dashboard-pages.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sample-dashboard-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prepare sample dashboard artifact
        shell: bash
        run: |
          mkdir -p _site
          cp -R examples/sample-dashboard/. _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
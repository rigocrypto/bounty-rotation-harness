name: Deploy GMX Landing Page

on:
  push:
    branches:
      - main
    paths:
      - 'GMX-Landing-page/GMX-Audit/project/**'
      - 'examples/sample-dashboard/**'
      - 'README.md'
      - '.github/workflows/gmx-landing-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gmx-landing-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: GMX-Landing-page/GMX-Audit/project
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: GMX-Landing-page/GMX-Audit/project/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          GITHUB_ACTIONS: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Bundle sample dashboard
        shell: bash
        run: |
          mkdir -p dist/dashboard
          cp -R "$GITHUB_WORKSPACE/examples/sample-dashboard/." dist/dashboard/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: GMX-Landing-page/GMX-Audit/project/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
name: Billing Health Alert

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  health-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run health alert
        env:
          BILLING_ALERT_EMAIL_TO: ${{ secrets.BILLING_ALERT_EMAIL_TO }}
          BILLING_ALERT_EMAIL_FROM: ${{ secrets.BILLING_ALERT_EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          BILLING_HEALTHCHECK_URL: ${{ secrets.BILLING_HEALTHCHECK_URL }}
          # GitHub-hosted runners are ephemeral, so persisted consecutive-failure state does not carry across runs.
          BILLING_HEALTH_ALERT_CONSECUTIVE_FAILURES: "1"
        run: npm run billing:health-alert